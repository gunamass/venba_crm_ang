<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card  col-md-3 col-10 shadow-lg p-4 admin-login-card">
        <div class="text-center mb-4">
            <!-- <h3 class="fw-bold text-dark">Admin Login</h3> -->
            <img src="icon/logo.png" class="col-6 mb-3" alt="">
            <p class="text-muted small">Sign in to manage the dashboard</p>
        </div>

        <form [formGroup]="adminLoginForm" (ngSubmit)="onAdminLogin()">
            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" formControlName="username" class="form-control" placeholder="Enter username">
                <small class="text-danger"
                    *ngIf="adminLoginForm.get('username')?.touched && adminLoginForm.get('username')?.invalid">
                    Username is required
                </small>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" formControlName="password" class="form-control" placeholder="Enter password">
                <small class="text-danger"
                    *ngIf="adminLoginForm.get('password')?.touched && adminLoginForm.get('password')?.invalid">
                    Password is required
                </small>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn k-btn py-2 w-100 mb-2">Login</button>
            <!-- <span class="text-muted small k-fc text-center badge text-decoration-underline" style="cursor: pointer;"
                [routerLink]="'login-creation'">Create Login Acc</span> -->
        </form>
    </div>
</div>

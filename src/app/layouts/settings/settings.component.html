<div class="container-fluid ">
  <div class="col-2 my-3">

    <select class="form-select " (change)="change($event)">
      <option value="">select type</option>
      <option value="leadStatus">Lead Status</option>
      <option value="course">Course</option>
      <option value="role">Role</option>
      <option value="TaskType">Task Type</option>
    </select>
  </div>
  <form [formGroup]="form" (ngSubmit)="createDrop()" class="p-3">
    <div formArrayName="items">
      <div *ngFor="let item of items.controls; let i = index" class="mb-2 d-flex align-items-center gap-2">
        <input [formControlName]="i" class="form-control" placeholder="Enter item" />
        <button type="button" class="btn btn-danger btn-sm" (click)="removeItem(i)" [disabled]="items.length === 1">
          &times;
        </button>
      </div>
    </div>
    <div class="my-3">
      <button type="button" class="btn btn-primary btn-sm" (click)="addItem()">Add Another</button>
    </div>
    <button type="submit" class="btn btn-success mt-3">Submit</button>
  </form>


  <div class="row g-4">
    <div class="col-md-4 k-fs" *ngFor="let item of allDropDown">
      <div class="card shadow-sm border-0 rounded-4 h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title text-primary fw-semibold">
              {{ item.dropdownType }}
            </h5>
            <button class="btn btn-outline-primary btn-sm" (click)="editItem(item)">
              <i class="fa fa-pencil me-1"></i> Edit
            </button>
          </div>

          <ul class="list-group list-group-flush">
            <li class="list-group-item border-0 ps-0" *ngFor="let val of item.values">
              <i class="fa fa-circle text-secondary me-2 small"></i>
              {{ val }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>



</div>
